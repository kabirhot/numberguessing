<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .game-section {
            display: none;
        }

        .game-section.active {
            display: block;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .feedback {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease-in-out;
        }

        .feedback.show {
            display: block;
        }

        .feedback.low,
        .feedback.high {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .attempts {
            text-align: center;
            font-size: 1.2em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .new-game-btn {
            flex: 1;
            padding: 12px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .new-game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .new-game-btn:active {
            transform: translateY(0);
        }

        .info {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Number Guess</h1>
        <p class="subtitle">Guess the number between 1 and 10</p>

        <!-- Start Game Section -->
        <div id="startSection" class="game-section active">
            <button class="start-btn" onclick="startGame()">Start Game</button>
            <div class="info">Click to begin playing!</div>
        </div>

        <!-- Playing Section -->
        <div id="playingSection" class="game-section">
            <div class="input-group">
                <label for="guessInput">Enter your guess:</label>
                <input 
                    type="number" 
                    id="guessInput" 
                    min="1" 
                    max="10" 
                    placeholder="Enter a number..."
                    onkeypress="handleKeyPress(event)"
                >
            </div>

            <button class="submit-btn" onclick="submitGuess()">Submit Guess</button>

            <div id="feedback" class="feedback"></div>
            <div class="attempts" id="attempts">Attempts: 0</div>

            <div class="button-group">
                <button class="new-game-btn" onclick="newGame()">New Game</button>
            </div>
        </div>
    </div>

    <script>
        function startGame() {
            fetch('/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('startSection').classList.remove('active');
                document.getElementById('playingSection').classList.add('active');
                document.getElementById('guessInput').focus();
                document.getElementById('attempts').textContent = 'Attempts: 0';
                document.getElementById('feedback').classList.remove('show');
            });
        }

        function submitGuess() {
            const guess = document.getElementById('guessInput').value;
            
            if (!guess) {
                showFeedback('Please enter a number', 'error');
                return;
            }

            fetch('/guess', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ guess: guess })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showFeedback(data.error, 'error');
                } else {
                    showFeedback(data.message, data.result);
                    document.getElementById('attempts').textContent = `Attempts: ${data.attempts}`;
                    
                    if (data.result === 'correct') {
                        setTimeout(() => {
                            newGame();
                        }, 2000);
                    }
                }
                document.getElementById('guessInput').value = '';
                document.getElementById('guessInput').focus();
            });
        }

        function showFeedback(message, type) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = message;
            feedback.className = `feedback show ${type}`;
        }

        function newGame() {
            fetch('/reset', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('playingSection').classList.remove('active');
                document.getElementById('startSection').classList.add('active');
                document.getElementById('feedback').classList.remove('show');
            });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitGuess();
            }
        }
    </script>
</body>
</html>
